<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <link rel="stylesheet" href="PG_stylescript.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>🔐 Password Generator 🔐</h1>

    <p class="subtitle">
        Create strong and secure passwords instantly
    </p>

    <label>Password Length</label>
    <input type="number" id="length" min="4" max="50" value="12">

    <div class="options">

        <label>
            <input type="checkbox" id="uppercase" checked>
            Uppercase Letters
        </label>

        <label>
            <input type="checkbox" id="lowercase" checked>
            Lowercase Letters
        </label>

        <label>
            <input type="checkbox" id="numbers" checked>
            Numbers
        </label>

        <label>
            <input type="checkbox" id="symbols" checked>
            Special Characters
        </label>

    </div>

    <button onclick="generatePassword()">
        Generate Password
    </button>

    <div class="output-section">

        <input type="text" id="password" readonly>

        <button class="copy-btn" onclick="copyPassword()">
            Copy
        </button>

    </div>

    <div id="strength"></div>

</div>

<script src="PG_javascript.js"></script>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>
<div class="bubble b5"></div>
<div class="bubble b6"></div>
<div class="bubble b7"></div>
<div class="bubble b8"></div>
<div class="bubble b9"></div>
<div class="bubble b10"></div>

</body>
</html>
